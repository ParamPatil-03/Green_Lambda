<!DOCTYPE html><html><head><style>
body { background: #000; color: #fff;}
.gauge-wrapper { position: relative; width: 200px; height: 100px; overflow: hidden; background: #333; margin: 50px auto; display: flex; align-items: flex-end; justify-content: center; }
.gauge-arch { position: absolute; bottom: 0; left: 50%; margin-left: -100px; width: 200px; height: 100px; border-top-left-radius: 100px; border-top-right-radius: 100px; border: 20px solid #1a1a1a; box-sizing: border-box; border-bottom: none; }
.gauge-fill { position: absolute; bottom: 0; left: 50%; margin-left: -100px; width: 200px; height: 100px; border-top-left-radius: 100px; border-top-right-radius: 100px; border: 20px solid #f00; box-sizing: border-box; border-bottom: none; transform-origin: 50% 100%; transform: rotate(-90deg); transition: transform 1s; }
</style></head><body><div class="gauge-wrapper"><div class="gauge-arch"></div><div class="gauge-fill"></div></div></body></html>
