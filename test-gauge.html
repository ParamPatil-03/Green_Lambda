<!DOCTYPE html><html><head><style>
.gauge-wrapper { position: relative; width: 200px; height: 100px; overflow: hidden; background: #333; margin: 50px auto; }
.gauge-arch { position: absolute; bottom: 0; left: 0; width: 200px; height: 100px; border-top-left-radius: 100px; border-top-right-radius: 100px; border: 20px solid #1a1a1a; box-sizing: border-box; border-bottom: none; }
.gauge-fill { position: absolute; bottom: 0; left: 0; width: 200px; height: 100px; border-top-left-radius: 100px; border-top-right-radius: 100px; border: 20px solid #f00; box-sizing: border-box; border-bottom: none; transform-origin: bottom center; transform: rotate(-90deg); }
</style></head><body><div class="gauge-wrapper"><div class="gauge-arch"></div><div class="gauge-fill"></div></div></body></html>
